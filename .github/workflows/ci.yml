name: CI

# Deliberately minimal. fmt, clippy, cargo check and the macOS test run all
# happen locally via ./scripts/check.sh (wired to a pre-push hook), because a
# round trip to a runner to be told about a formatting nit is pure latency.
#
# What stays here is the single thing the dev machine cannot do natively: prove
# the crate still builds and tests on Linux. release.yml already builds both
# Linux targets on tag, but a Linux-only break would then surface during a
# release rather than on the push that caused it.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    # A hung job otherwise runs to the 6-hour default before GitHub kills it.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo check --all-targets

      - name: Test
        run: cargo test --all
